<div class="login-wrap">
  <form class="login-card panel" data-testid="login-form" (ngSubmit)="submit()">
    <div class="login-brand">
      <span class="brand-mark">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="9" />
          <path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor" stroke="none" />
        </svg>
      </span>
      <div>
        <h1>Front Desk · Leads</h1>
        <span class="brand-sub">Sign in to continue</span>
      </div>
    </div>

    <div>
      <label class="field-label" for="login-email">Email</label>
      <input
        id="login-email"
        data-testid="login-email"
        class="input"
        type="email"
        name="email"
        autocomplete="username"
        [(ngModel)]="email"
        [disabled]="submitting()"
        required
      />
    </div>

    <div>
      <label class="field-label" for="login-password">Password</label>
      <input
        id="login-password"
        data-testid="login-password"
        class="input"
        type="password"
        name="password"
        autocomplete="current-password"
        [(ngModel)]="password"
        [disabled]="submitting()"
        required
      />
    </div>

    @if (error()) {
      <p class="login-error" data-testid="login-error">{{ error() }}</p>
    }

    <button class="btn btn-primary login-submit" data-testid="login-submit" type="submit" [disabled]="submitting()">
      {{ submitting() ? 'Signing in…' : 'Sign in' }}
    </button>
  </form>
</div>
